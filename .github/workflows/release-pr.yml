name: Release candidate

# Pre-merge validation for RELEASE pull requests. Add the `release` label to a
# PR to run the full E2E demo suite and a per-arch (native, no QEMU) image build
# (no push) BEFORE merge. Merge only when green, then tag the merged commit --
# release.yml re-runs E2E as the hard gate before promoting the image.
#
# Normal PRs are unaffected (the jobs are skipped without the label), so the
# fast lane in ci.yml stays fast.
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]

jobs:
  e2e:
    name: E2E gate (release PR)
    if: contains(github.event.pull_request.labels.*.name, 'release')
    uses: ./.github/workflows/e2e.yml

  image-build:
    name: Image build (no push, ${{ matrix.arch }})
    if: contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
