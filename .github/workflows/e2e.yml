name: E2E demos

# The heavy end-to-end demo stacks. Exposed as a REUSABLE workflow so it can be
# invoked as a hard gate by:
#   - release.yml      (on a v* tag, BEFORE the image is published)
#   - release-pr.yml   (on a PR labeled `release`, BEFORE merge)
# and run manually via workflow_dispatch. It is deliberately NOT on the per-PR
# fast lane (ci.yml) to keep that lane fast.
on:
  workflow_call: {}
  workflow_dispatch: {}

env:
  # Run JS actions on Node 24 (forced default from 2026-06-16). Drop once all
  # actions ship Node 24 runtimes natively.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  demos:
    name: Demo stacks E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run FOSS demo stacks end-to-end
        run: ./scripts/run-demos-ci.sh

  # Conformance (AWS KMS shim vs real aws-sdk-kms) plugs in here at Phase 2.
  # It lives in keyrack-commercial; this lane is the gating point once that
  # compose profile exists. See keyrack-internal/docs/architecture/conformance.md.
