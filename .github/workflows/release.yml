name: Release

# On a version tag, run the full E2E demo suite FIRST, then publish the
# multi-arch image ONLY if E2E passes. This makes E2E a hard release gate:
# a failing demo blocks the publish (unlike a parallel workflow, which would
# let the image ship even on a red E2E run).
on:
  push:
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: keyrack-io/keyrack-service

jobs:
  e2e:
    name: E2E gate
    uses: ./.github/workflows/e2e.yml

  publish:
    name: Build + push multi-arch image
    needs: e2e
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # latest=auto tags `:latest` only for the highest NON-prerelease
          # semver tag, so prereleases (e.g. 0.2.0-beta.2) never become latest.
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
