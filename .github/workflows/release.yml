name: Release

# On a version tag, run the full E2E demo suite FIRST, then PROMOTE the image
# that docker.yml already built for this commit (published as :sha-<short> on
# the main push) to the release version tags. No rebuild: the released image is
# byte-identical to what E2E validated. A failed E2E blocks the promote.
on:
  push:
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: keyrack-io/keyrack-service

jobs:
  e2e:
    name: E2E gate
    uses: ./.github/workflows/e2e.yml

  publish:
    name: Promote image to release tags
    needs: e2e
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract release metadata (tags)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # latest=auto tags :latest only for the highest NON-prerelease semver,
          # so prereleases (e.g. 0.2.0-beta.2) never become :latest.
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # docker.yml built this exact commit on the main push and published it as
      # :sha-<short> (metadata-action type=sha => 7-char short sha).
      - name: Resolve source image
        id: src
        run: echo "ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-$(echo ${GITHUB_SHA} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Wait for source image
        run: |
          for i in $(seq 1 60); do
            if docker buildx imagetools inspect "${{ steps.src.outputs.ref }}" >/dev/null 2>&1; then
              echo "found ${{ steps.src.outputs.ref }}"; exit 0
            fi
            echo "waiting for ${{ steps.src.outputs.ref }} ($i/60)"; sleep 30
          done
          echo "source image ${{ steps.src.outputs.ref }} never appeared"; exit 1

      - name: Promote to release tags
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            "${{ steps.src.outputs.ref }}"

      - name: Inspect
        run: docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
