apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: keyrack-demo
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - { name: POSTGRES_USER, value: keyrack }
            - { name: POSTGRES_PASSWORD, value: keyrack }
            - { name: POSTGRES_DB, value: keyrack }
            # ephemeral storage is fine here; durability/restart-survival is demo 04
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U keyrack -d keyrack"]
            initialDelaySeconds: 2
            periodSeconds: 2
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: keyrack-demo
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
