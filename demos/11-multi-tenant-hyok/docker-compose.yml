services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: keyrack
      POSTGRES_PASSWORD: keyrack
      POSTGRES_DB: keyrack
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keyrack -d keyrack"]
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - pg-data:/var/lib/postgresql/data

  nats:
    image: nats:alpine
    command: ["--jetstream", "--store_dir", "/data", "--http_port", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/varz"]
      interval: 2s
      timeout: 3s
      retries: 5
      start_period: 2s

  jwt-issuer:
    build:
      context: ./jwt-issuer
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/.well-known/jwks.json"]
      interval: 2s
      timeout: 3s
      retries: 10

  keyrack:
    build:
      context: ../..
      dockerfile: demos/11-multi-tenant-hyok/Dockerfile.keyrack
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      jwt-issuer:
        condition: service_healthy
    environment:
      KEYRACK_CONFIG: /config/keyrack.yaml
      RUST_LOG: info,keyrack_service=debug
      SOFTHSM2_CONF: /etc/softhsm/softhsm2.conf
    ports:
      - "50051:50051"
      - "8080:8080"
    volumes:
      - ./config/keyrack.yaml:/config/keyrack.yaml:ro
      - hsm-tokens:/var/lib/softhsm/tokens
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/healthz"]
      interval: 2s
      timeout: 5s
      retries: 15

  demo:
    build:
      context: .
      dockerfile: Dockerfile.demo
    depends_on:
      keyrack:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts:ro
      - ./proto:/proto:ro

volumes:
  hsm-tokens:
  pg-data:
