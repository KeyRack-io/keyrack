grpc_addr: "0.0.0.0:50051"
rest_addr: "0.0.0.0:8080"

storage:
  type: postgres
  database_url: postgres://keyrack:keyrack@postgres:5432/keyrack

# A software provider as the fallback default. Tenant HSM backends are
# registered dynamically via CreateHsmConnection with scope_owner.
provider:
  type: software

# Routing: regulated keys are pinned to the default (software) backend by
# operator policy; everything else uses delegate_any (caller picks via
# backend_id). This shows both route (authoritative pin) and delegate_any.
provider_routing:
  - match:
      regulated: "true"
    action: route
    provider: default
  - match: {}
    action: delegate_any

pdp:
  type: always_allow

audit:
  type: nats
  url: nats://nats:4222

sign_audit_events: true
audit_signing_key_path: /data/audit-signing-key

authn:
  type: jwt
  jwks_url: http://jwt-issuer:9000/.well-known/jwks.json
  issuer: http://jwt-issuer:9000
  claims_namespace: "keyrack:"

nats_notify:
  url: nats://nats:4222
  audit_subject_prefix: kms.audit
  state_changed_subject_prefix: kms.key.state-changed

cache:
  max_capacity: 1000
  ttl_secs: 60
