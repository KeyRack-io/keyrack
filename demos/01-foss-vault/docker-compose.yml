services:
  vault:
    image: hashicorp/vault:1.17
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: demo-root-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "sh", "-c", "VAULT_ADDR=http://127.0.0.1:8200 vault status"]
      interval: 2s
      timeout: 5s
      retries: 10
    cap_add:
      - IPC_LOCK

  vault-init:
    image: hashicorp/vault:1.17
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: demo-root-token
    entrypoint: /bin/sh
    command:
      - -c
      - |
        vault secrets enable transit
        echo "Transit engine enabled"

  keyrack:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.service
    depends_on:
      vault-init:
        condition: service_completed_successfully
    environment:
      KEYRACK_CONFIG: /config/keyrack.yaml
    ports:
      - "50051:50051"
      - "8080:8080"
    volumes:
      - ./config:/config:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/healthz"]
      interval: 2s
      timeout: 5s
      retries: 15

  demo:
    image: curlimages/curl:8.10.1
    depends_on:
      keyrack:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: /bin/sh
    command: ["/scripts/run-demo.sh"]
