services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: keyrack
      POSTGRES_PASSWORD: keyrack_test
      POSTGRES_DB: keyrack_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keyrack"]
      interval: 2s
      timeout: 5s
      retries: 10

  # ---- Live service stack (for E2E and manual testing) ----

  cedar-pdp:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
    entrypoint: ["keyrack-cedar-pdp"]
    environment:
      - CEDAR_POLICY_PATH=/config/cedar-policy.cedar
      - CEDAR_PDP_ADDR=0.0.0.0:8181
      - RUST_LOG=info
    volumes:
      - ./docker/config:/config:ro
    ports:
      - "8181:8181"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8181/healthz || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 10

  keyrack-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
    environment:
      - KEYRACK_CONFIG=/config/keyrack.yaml
      - RUST_LOG=info
    volumes:
      - ./docker/config:/config:ro
    ports:
      - "50051:50051"
      - "8080:8080"
    depends_on:
      cedar-pdp:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/healthz || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 15

  e2e-test:
    build:
      context: .
      dockerfile: docker/Dockerfile.e2e
    command:
      - cargo
      - run
      - --manifest-path
      - crates/keyrack-e2e/Cargo.toml
      - --
      - --grpc-endpoint
      - http://keyrack-service:50051
      - --rest-endpoint
      - http://keyrack-service:8080
    depends_on:
      keyrack-service:
        condition: service_healthy
    environment:
      - RUST_LOG=info
      - RUST_BACKTRACE=1

  # ---- Existing in-process test services ----

  e2e:
    build:
      context: .
      dockerfile: docker/Dockerfile.e2e
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - RUST_BACKTRACE=1
      - KMS_PKCS11_LIB=/usr/lib/softhsm/libsofthsm2.so
      - KMS_PKCS11_TOKEN_LABEL=keyrack-e2e
      - KMS_PKCS11_PIN=1234
      - DATABASE_URL=postgres://keyrack:keyrack_test@postgres:5432/keyrack_test

  # Quick mode: skip property tests for faster CI feedback
  e2e-quick:
    build:
      context: .
      dockerfile: docker/Dockerfile.e2e
    depends_on:
      postgres:
        condition: service_healthy
    command: ["cargo", "test", "--workspace", "--features", "keyrack-pkcs11/softhsm-tests,keyrack-postgres/live-tests", "--lib", "--test", "e2e_smoke", "--test", "conformance", "--", "--nocapture"]
    environment:
      - RUST_BACKTRACE=1
      - KMS_PKCS11_LIB=/usr/lib/softhsm/libsofthsm2.so
      - KMS_PKCS11_TOKEN_LABEL=keyrack-e2e
      - KMS_PKCS11_PIN=1234
      - DATABASE_URL=postgres://keyrack:keyrack_test@postgres:5432/keyrack_test

  clippy:
    build:
      context: .
      dockerfile: docker/Dockerfile.e2e
    command: ["cargo", "clippy", "--workspace", "--features", "keyrack-pkcs11/softhsm-tests", "--", "-D", "warnings"]
